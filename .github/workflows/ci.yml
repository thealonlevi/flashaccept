name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install deps (ensure liburing >= 2.3, header+lib consistent)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config git liburing-dev
          if ! pkg-config --atleast-version=2.3 liburing 2>/dev/null; then
            echo "apt liburing $(pkg-config --modversion liburing 2>/dev/null || echo none) too old; removing and building 2.6 from source"
            sudo apt-get remove -y liburing-dev liburing2 || true   # avoid header(new)/lib(old) mismatch
            git clone --depth 1 --branch liburing-2.6 https://github.com/axboe/liburing /tmp/liburing
            ( cd /tmp/liburing && ./configure --prefix=/usr && make -j"$(nproc)" && sudo make install )
            sudo ldconfig
          fi
          echo "using liburing $(pkg-config --modversion liburing)"
      - name: Build library
        run: make
      - name: Build examples
        run: make examples
      - name: Staged install + pkg-config consumer
        run: |
          make install PREFIX=/tmp/fa
          test -f /tmp/fa/lib/pkgconfig/flashaccept.pc
          PKG_CONFIG_PATH=/tmp/fa/lib/pkgconfig pkg-config --modversion flashaccept
          PKG_CONFIG_PATH=/tmp/fa/lib/pkgconfig \
            cc -O2 examples/echo_server.c $(PKG_CONFIG_PATH=/tmp/fa/lib/pkgconfig pkg-config --cflags --libs flashaccept) \
               -Wl,-rpath,/tmp/fa/lib -o /tmp/consumer
      - name: CMake build + install + find_package consumer
        run: |
          sudo apt-get install -y cmake
          cmake -S . -B /tmp/cmkbuild -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/cmkbuild -j"$(nproc)"
          cmake --install /tmp/cmkbuild --prefix /tmp/cmkinst
          test -f /tmp/cmkinst/lib/cmake/flashaccept/flashaccept-config.cmake
          test -f /tmp/cmkinst/lib/pkgconfig/flashaccept.pc
          # downstream find_package(flashaccept CONFIG)
          mkdir -p /tmp/fpkg && cd /tmp/fpkg
          printf '#include <flashaccept.h>\n#include <stdio.h>\nint main(void){printf("%%s\\n",fa_version());return 0;}\n' > app.c
          printf 'cmake_minimum_required(VERSION 3.14)\nproject(c C)\nfind_package(flashaccept CONFIG REQUIRED)\nadd_executable(app app.c)\ntarget_link_libraries(app PRIVATE flashaccept::flashaccept)\n' > CMakeLists.txt
          cmake -S . -B b -DCMAKE_PREFIX_PATH=/tmp/cmkinst
          cmake --build b
          LD_LIBRARY_PATH=/tmp/cmkinst/lib ./b/app
      - name: Smoke test (fast path + full fallback)
        run: |
          cat > /tmp/probe.c <<'C'
          #include <stdio.h>
          #include <string.h>
          #include <unistd.h>
          #include <arpa/inet.h>
          #include <sys/socket.h>
          int main(int c,char**v){int port=atoi(v[1]),ok=0;
            for(int i=0;i<300;i++){int fd=socket(AF_INET,SOCK_STREAM,0);
              struct sockaddr_in a={0};a.sin_family=AF_INET;a.sin_port=htons(port);
              inet_pton(AF_INET,"127.0.0.1",&a.sin_addr);
              if(connect(fd,(void*)&a,sizeof a)==0){write(fd,"GET / HTTP/1.1\r\n\r\n",18);
                char b[64];if(read(fd,b,sizeof b)>0)ok++;}
              close(fd);}
            printf("completed %d/300\n",ok);return ok>=285?0:1;}
          C
          cc -O2 -o /tmp/probe /tmp/probe.c
          set -e
          for cfg in "1 1" "0 1" "1 0" "0 0"; do
            set -- $cfg
            echo "== multishot=$1 direct=$2 =="
            ./examples/echo_server --port 18080 --multishot $1 --direct $2 & SRV=$!
            sleep 1; /tmp/probe 18080; kill $SRV 2>/dev/null || true; sleep 1
          done

  sanitizers:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps (ensure liburing >= 2.3, header+lib consistent)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config git liburing-dev
          if ! pkg-config --atleast-version=2.3 liburing 2>/dev/null; then
            sudo apt-get remove -y liburing-dev liburing2 || true
            git clone --depth 1 --branch liburing-2.6 https://github.com/axboe/liburing /tmp/liburing
            ( cd /tmp/liburing && ./configure --prefix=/usr && make -j"$(nproc)" && sudo make install )
            sudo ldconfig
          fi
      - name: Build with AddressSanitizer + UBSan
        run: |
          cc -O1 -g -fsanitize=address,undefined -Iinclude -fPIC -c src/flashaccept.c -o /tmp/fa.o
          cc -O1 -g -fsanitize=address,undefined -Iinclude examples/echo_server.c /tmp/fa.o \
             -o /tmp/echo_asan -luring -lpthread
      - name: Run under sanitizers (load + clean shutdown, leak check)
        run: |
          cat > /tmp/probe.c <<'C'
          #include <stdio.h>
          #include <string.h>
          #include <unistd.h>
          #include <arpa/inet.h>
          #include <sys/socket.h>
          int main(){for(int i=0;i<2000;i++){int fd=socket(AF_INET,SOCK_STREAM,0);
            struct sockaddr_in a={0};a.sin_family=AF_INET;a.sin_port=htons(18081);
            inet_pton(AF_INET,"127.0.0.1",&a.sin_addr);
            if(connect(fd,(void*)&a,sizeof a)==0){write(fd,"GET / HTTP/1.1\r\n\r\n",18);
              char b[64];(void)!read(fd,b,sizeof b);}close(fd);}return 0;}
          C
          cc -O2 -o /tmp/probe /tmp/probe.c
          ASAN_OPTIONS=detect_leaks=1:abort_on_error=1 /tmp/echo_asan --port 18081 > /tmp/asan.log 2>&1 &
          SRV=$!; sleep 2
          /tmp/probe
          kill -TERM $SRV; sleep 2
          cat /tmp/asan.log
          # fail if the sanitizer reported anything
          ! grep -qiE 'ERROR|runtime error|detected memory leaks' /tmp/asan.log
